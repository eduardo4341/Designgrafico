<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
}

body{
    font-family:Arial, sans-serif;
    background:#f6efe9;
    color:#3b2f2f;
    line-height:1.6;

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#8b5e3c,#5c3b1e);
    color:white;
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:2.5rem;
}

/* MAIN */
main{
    flex:1;
    max-width:1000px;
    width:100%;
    margin:40px auto;
    padding:20px;
}

/* SECTION */
section{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    border-left:5px solid #8b5e3c;
}

/* TEXTOS */
p{
    margin-bottom:20px;
}

/* TITULOS */
h2{
    color:#8b5e3c;
    margin-bottom:10px;
}

/* LISTA */
ul{
    padding-left:20px;
}

/* FOOTER */
footer{
    text-align:center;
    background:#3b2f2f;
    color:white;
    padding:20px;
}

/* RESPONSIVO */
@media (max-width:768px){
    header h1{
        font-size:1.8rem;
    }

    main{
        margin:20px auto;
        padding:15px;
    }

    section{
        padding:20px;
    }
}
</style>

</head>

<body>

<header>
<h1>Curso de Design Gráfico</h1>
</header>

<main>
<section>

<p>
O curso prepara profissionais para criar soluções visuais e digitais.
</p>

<h2>Disciplinas</h2>

<ul>
<li>Tipografia</li>
<li>Fotografia</li>
<li>Ilustração</li>
<li>UI Design</li>
<li>UX Design</li>
<li>Design Digital</li>
</ul>

</section>
</main>

<footer>
© 2026 - Currículo Profissional
</footer>

</body>
</html>
