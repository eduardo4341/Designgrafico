<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área de Atuação</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f6efe9;
    color:#3b2f2f;
    line-height:1.6;

    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:linear-gradient(135deg,#8b5e3c,#5c3b1e);
    color:white;
    text-align:center;
    padding:60px 20px;
}

header h1{
    color:white;
    font-size:2.5rem;
}

main{
    flex:1;
    width:100%;
    max-width:1000px;
    margin:40px auto;
    padding:0 20px;
}

section{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
    border-left:5px solid #8b5e3c;
}

h2{
    color:#8b5e3c;
    margin-bottom:15px;
}

ul{
    padding-left:25px;
}

li{
    margin-bottom:10px;
}

footer{
    text-align:center;
    background:#3b2f2f;
    color:white;
    padding:20px;
    margin-top:auto;
}

/* Responsivo */
@media (max-width:768px){

    header{
        padding:40px 15px;
    }

    header h1{
        font-size:1.8rem;
    }

    main{
        padding:0 15px;
        margin:20px auto;
    }

    section{
        padding:18px;
    }
}
</style>

</head>
<body>

<header>
    <h1>Área de Atuação</h1>
</header>

<main>
    <section>

        <h2>Principais Áreas</h2>

        <ul>
            <li>Design Gráfico</li>
            <li>UI Design</li>
            <li>UX Design</li>
            <li>Web Design</li>
            <li>Marketing Digital</li>
            <li>Branding</li>
        </ul>

    </section>
</main>

<footer>
    © 2026 - Currículo Profissional
</footer>

</body>
</html>
